name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.
        See [GitHub's guide on writing good issues](https://docs.github.com/en/issues/tracking-your-work-with-issues/creating-an-issue).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SlackHive version
      placeholder: "e.g. 0.1.18"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 22.04, macOS 14"
    validations:
      required: true

  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: "e.g. 25.0.3"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs (runner logs, browser console, etc.)
      render: shell
