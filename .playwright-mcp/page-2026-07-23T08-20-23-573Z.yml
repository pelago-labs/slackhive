          - generic [ref=f16e30]:
            - paragraph [ref=f16e31]: "Citizens for Justice and Peace (CJP) is a Human Rights movement dedicated to upholding and defending the freedom and constitutional rights of all Indians. We call our focus areas our Four Pillars. These are:"
            - paragraph [ref=f16e32]: Minority Rights - Rights of religious, ethnic, caste, gender and sexual minorities as well as persons with disabilities.
            - paragraph [ref=f16e33]: Freedom of Expression - A healthy and vibrant democracy always respects free expression and the dignity of different belief systems, cultures and languages. Hate speech, we believe, is an abuse of this freedom.
            - paragraph [ref=f16e34]: Criminal Justice Reform - CJP believes that our agencies - investigation, prosecutorial and judicial - need further democratisation to ensure both, quality and quick justice delivery.
            - paragraph [ref=f16e35]: Child Rights & Education - CJP works to inculcate pluralism and Constitutional values in young minds. We also work in the field of Juvenile Justice Reform and protection of children from Sexual Abuse.
            - paragraph [ref=f16e36]: All our campaigns are aimed at empowering the disempowered and defending their rights and freedoms, so that all Indians may live in peace and with dignity.
