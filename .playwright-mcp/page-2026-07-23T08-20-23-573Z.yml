            - 'heading "FOREST RIGHTS: SONBHADRA AND DUDHWA NATIONAL PARK (UTTAR PRADESH), CHITRAKOOT (MADHYA PRADESH)" [level=3] [ref=f16e85]'
            - 'heading "PARTNER ORGANISATION: ALL INDIA UNION OF FOREST WORKING PEOPLE (AIUFWP)" [level=3] [ref=f16e86]'
            - paragraph [ref=f16e87]: "Objective: To empower Adivasis, forest-dwellers and forest workers defend their rights under the Forest Rights Act 2006. To also defend Forest Rights activists against malicious prosecution and incarceration on trumped up charges."
            - paragraph [ref=f16e88]: "Actions: Training Adivasi and forest working people file Community Forest Rights claims as per FRA 2006. Over 7,000 people trained across 60 villages so far!"
            - list [ref=f16e89]:
              - listitem [ref=f16e90]: Support them in filing Community Forest Rights Claims and follow-ups.
              - listitem [ref=f16e91]: Moving NCST, NHRC etc. to help get justice for Adivasis and forest dwellers who are harassed by the Forest Department or local police.
              - listitem [ref=f16e92]: Over 150 complaints files so far against false and malicious prosecution of Adivasi human rights defenders!
              - listitem [ref=f16e93]: CJP has moved court to help secure release of Forest Rights Defenders detained on trumped up charges.
              - listitem [ref=f16e94]: Mentoring Adivasi women to take up leadership of grassroots movements.
            - 'heading "CJP''S GRASSROOTS FELLOWSHIP: NATIONWIDE" [level=3] [ref=f16e95]'
            - paragraph [ref=f16e96]: CJP’s Grassroots Fellowship Program is a unique initiative aiming to give voice and agency, as well as mentor youth leaders from among the communities with whom we work closely. These presently include migrant workers, Dalits, Adivasis and forest workers.
            - list [ref=f16e97]:
              - listitem [ref=f16e98]: We also train these fellows in correct research and documentation procedures, in order to build a community of on-ground researchers and community leaders.
              - listitem [ref=f16e99]: We are exploring solutions to gain access to legal and Constitutional experts. Explore solutions, gain access to legal and constitutional experts.
              - listitem [ref=f16e100]: Build a community of on-ground researchers and community leaders.
            - heading "KHOJ" [level=3] [ref=f16e101]
            - paragraph [ref=f16e102]: "Objective: To give an opportunity to school children to understand diversity, peace and harmony."
            - list [ref=f16e103]:
              - listitem [ref=f16e104]: We teach students to be critical in their approach to knowledge and decision making.
              - listitem [ref=f16e105]: We encourage children to go beyond the narrow confines of their syllabus, and foster an open atmosphere of learning and sharing within the classroom.
              - listitem [ref=f16e106]: The emphasis is on pluralism and inclusion.
              - listitem [ref=f16e107]: Khoj has helped 56,000 students in over 850 schools; 1,300 teachers have been trained.
            - 'heading "GUJARAT VIOLENCE 2002: IN THE COURTS" [level=3] [ref=f16e108]'
            - paragraph [ref=f16e109]: Zakia Jafri and CJP moved Supreme Court to ask for a proper investigation into allegations made in Zakia Jafri’s complaint from June 2008 and the Protest Petition. The SIT probing the Gujarat 2002 violence had failed to take into account several key pieces of evidence and filed a closure report that was accepted by a Magistrate’s court. The court also claimed it had no power to direct further investigation, and we have sought clarification on the same. While Zakia Jafri is the first petitioner, CJP via its secretary Teesta Setalvad is the second petitioner in the Zakia Jafri Case. CJP has also helped survivors in trials related to Naroda Patiya, Naroda Gam, Sardarpura, Ode (1 and 2) and Gulberg massacre.
            - heading "PETITIONS TO JUDICIAL AUTHORITIES" [level=3] [ref=f16e110]
            - list [ref=f16e111]:
              - listitem [ref=f16e112]:
                - link "SLP before Supreme Court" [ref=f16e113] [cursor=pointer]:
                  - /url: https://cjp.org.in/zakia-jafri-and-cjp-still-seeking-justice-for-gujarat-2002-victims-and-survivors/
                - text: ": Hearings concluded"
              - listitem [ref=f16e114]:
                - text: CJP via its secretary Teesta Setalvad is the second petitioner in the
                - link "Zakia Jafri Case" [ref=f16e115] [cursor=pointer]:
                  - /url: https://cjp.org.in/zakia-jafri-case/
                - text: .
            - heading "CJP'S OTHER ACTIVITIES" [level=2] [ref=f16e116]
            - paragraph [ref=f16e117]: "Workshops and Training Sessions: CJP conducts a variety of workshops to empower media students, activists and legal practitioners and teachers, in the proper methods to conduct fact finding missions and document their findings. We also conduct Teachers Training workshops in Constitutional values, Pluralism, History and Social Sciences."
            - paragraph [ref=f16e118]:
              - text: CJP's series of workshops on How to Spot and Stop Fake News are being held at different locations, Chennai, Mangalore, Mumbai and Varanasi. The one in February 2018 at Varanasi's Mahatma Gandhi Kashi Vidyapeeth struck fear in the hearts of right-wing extremists. They not only threatened us but also
              - link "surrounded CJP Secretary Teesta Setalvad" [ref=f16e119] [cursor=pointer]:
                - /url: https://cjp.org.in/up-police-sides-with-the-abvp-prevents-cjps-workshop-on-how-to-stop-fake-news/
              - text: and tried to prevent us from conducting the workshop, the contents of which were designed to expose their modus operandi in spreading misinformation. The workshop however continued at another venue.
            - heading "Legal and Community Resources:" [level=2] [ref=f16e120]
            - paragraph [ref=f16e121]:
              - text: Keeping in mind the need to provide help to defenders of constitutional values, CJP has put together comprehensive
              - link "legal" [ref=f16e122] [cursor=pointer]:
                - /url: https://cjp.org.in/section/legal-resources/
              - text: and
              - link "community resources" [ref=f16e123] [cursor=pointer]:
                - /url: https://cjp.org.in/tag/CommunityResources/
              - text: that address issues as wide ranging as gender, caste and child rights.
            - paragraph [ref=f16e124]:
              - text: Read more about
              - link "CJP's Other Initiatives" [ref=f16e125] [cursor=pointer]:
                - /url: https://cjp.org.in/cjps-other-initiatives/
            - paragraph [ref=f16e126]:
              - text: Read all about
              - link "CJP's Impact" [ref=f16e127] [cursor=pointer]:
                - /url: https://cjp.org.in/cjps-other-initiatives/
