            - paragraph [ref=f16e39]: "Ever since our relaunch in 2017, we have spearheaded both, legal campaigns as well as citizens' interventions to empower and assist our fellow Indians navigate complex and extremely divisive political ploys, and hate-filled communal minefields. We also worked to ensure police transparency and accountability when vulnerable communities are under threat. Some of our initiatives include:"
            - heading "KEY INTERVENTIONS" [level=2] [ref=f16e40]
            - 'heading "HATE HATAO: NATIONWIDE" [level=3] [ref=f16e41]'
            - paragraph [ref=f16e42]: "Objective: To spot instances of hate speech (by politicians, social media trolls and news broadcasters/publications) and report it to relevant authorities. (Special focus on Hate Speech against religious minorities, Dalits, Adivasis, Women, Children and LGBTQIA+)"
            - paragraph [ref=f16e43]: "Actions: Over 200 petitions moved before organisations like National Commission for Minorities (NCM), National Human Rights Commission (NHRC), National Broadcasting and Digital Standards Authority (NBDSA), National Commission for Scheduled Tribes (NCST), National Commission for Women (NCW), Facebook, Twitter etc."
            - heading "PETITIONS TO JUDICIAL AND NON-JUDICIAL AUTHORITIES" [level=3] [ref=f16e44]
            - list [ref=f16e45]:
              - listitem [ref=f16e46]:
                - generic [ref=f16e47]:
                  - link "Petition to NBDSA" [ref=f16e48] [cursor=pointer]:
                    - /url: https://cjp.org.in/nbdsa-orders-news-nation-to-take-down-video-of-conversion-jihad-show/
                  - text: ":"
                - text: News Nation ordered to take down videos of “Conversion Jihad” show.
              - listitem [ref=f16e49]:
                - generic [ref=f16e50]:
                  - link "Complaint to Twitter" [ref=f16e51] [cursor=pointer]:
                    - /url: https://cjp.org.in/cjp-impact-twitter-suspends-21-accounts-threatening-muslim-women-with-sexual-violence/
                  - text: ":"
                - text: 21 accounts threatening Muslim women with sexual violence removed.
              - listitem [ref=f16e52]:
                - generic [ref=f16e53]:
                  - link "Complaint to NCM" [ref=f16e54] [cursor=pointer]:
                    - /url: https://cjp.org.in/ncm-seeks-report-from-dgp-assam-on-cjps-complaint-against-kamlendu-sarkar/
                  - text: ":"
                - text: DGP asked to submit report on action taken against Kamlendu Sarkar’s hate speech where he had alleged that Prophet Mohammed was a rapist.
              - listitem [ref=f16e55]:
                - link "Intervention Application (Crl. M.P. No. 102148 of 2020) before Supreme Court:" [ref=f16e57] [cursor=pointer]:
                  - /url: https://cjp.org.in/sc-entrusts-witness-protection-of-hathras-victims-family-to-crpf/
                - text: CJP had prayed for a judicial monitoring of the Hathras rape and forced cremation investigation, and the protection of witnesses by Central paramilitary forces. The SC directed that CRPF provide security to the victim’s family and the witnesses. The court also directed the Allahabad High Court to monitor the CBI probe into the case.
            - 'heading "CITIZENSHIP: ASSAM" [level=3] [ref=f16e58]'
            - list [ref=f16e59]:
              - listitem [ref=f16e60]: Provide legal aid (legal counseling and legal representation)
              - listitem [ref=f16e61]: Train lawyers and paralegals to improve quality of legal aid provided
              - listitem [ref=f16e62]: Release detainees from Assam Detention camps; provide psycho-social and rehabilitative support to them and their families
            - paragraph [ref=f16e63]: "Objective: To help Indian citizens defend their citizenship"
            - paragraph [ref=f16e64]: "Actions: Helped over 12 lakh Indian citizens compile documents and file applications for inclusion of names in the National Register of Citizens (NRC)."
            - list [ref=f16e65]:
              - listitem [ref=f16e66]: CJP also helped them defend their citizenship during the Claims and Objections stage.
              - listitem [ref=f16e67]: Helped over 50 eligible inmates of detention centres get released on bail.
              - listitem [ref=f16e68]: Trained volunteers to offer paralegal assistance to people during the citizenship crisis. They reach around 100 families each month.
              - listitem [ref=f16e69]: Assisting people move Guwahati High Court against ex parte orders by Foreigners’ Tribunals.
              - listitem [ref=f16e70]: Helping migrant labourers from other states who have been declared “foreigners” in Assam and thrown behind bars.
              - listitem [ref=f16e71]: Conducting studies and surveys to ascertain if existing legal aid structure is sufficiently competent to tackle expected deluge of applications from people excluded from the NRC.
              - listitem [ref=f16e72]: Strategic legal interventions to defend rights and freedoms of our fellow Indians in Assam.
            - heading "PETITIONS TO JUDICIAL AND NON-JUDICIAL AUTHORITIES" [level=3] [ref=f16e73]
            - list [ref=f16e74]:
              - listitem [ref=f16e75]:
                - link "Petition on Legal Aid before Gauhati High Court:" [ref=f16e76] [cursor=pointer]:
