                    - text: (paternal grandfather)
            - paragraph [ref=f15e134]:
              - text: Teesta Setalvad (born 9 February 1962)
              - superscript [ref=f15e135]:
                - link "[1]" [ref=f15e136] [cursor=pointer]:
                  - /url: "#cite_note-Dob-1"
              - text: is an Indian civil rights activist and journalist. She is the secretary of Citizens for Justice and Peace (CJP), an organisation formed to advocate for the victims of
              - link "2002 Gujarat riots" [ref=f15e138] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/2002_Gujarat_riots
              - text: .
          - region [ref=f15e139]:
            - generic [ref=f15e140]:
              - heading "Personal life" [level=2] [ref=f15e141]
              - generic [ref=f15e142]:
                - link "edit":
                  - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=1
            - paragraph [ref=f15e143]:
              - text: Born in 1962 into a
              - link "Gujarati" [ref=f15e144] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gujarati_people
              - text: family, Setalvad is the daughter of Atul Setalvad, a Mumbai-based lawyer, and his wife Sita Setalvad. Her paternal grandfather was
              - link "M. C. Setalvad" [ref=f15e145] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/M._C._Setalvad
              - text: ", India's first Attorney General."
              - superscript [ref=f15e146]:
                - link "[2]" [ref=f15e147] [cursor=pointer]:
                  - /url: "#cite_note-exilclub.de-2"
              - superscript [ref=f15e149]:
                - link "[3]" [ref=f15e150] [cursor=pointer]:
                  - /url: "#cite_note-3"
              - text: Setalvad married
              - link "Javed Anand" [ref=f15e152] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Javed_Anand
              - text: ", a journalist turned minority rights activist. They have two children, a daughter and a son."
              - superscript [ref=f15e153]:
                - link "[4]" [ref=f15e154] [cursor=pointer]:
                  - /url: "#cite_note-4"
          - region [ref=f15e156]:
            - generic [ref=f15e157]:
              - heading "Career" [level=2] [ref=f15e158]
              - generic [ref=f15e159]:
                - link "edit":
                  - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=2
            - paragraph [ref=f15e160]:
              - text: In a public discussion at the Press club in March 2017, Teesta recounted that despite coming from a family steeped in a legal heritage, she decided to pursue a career in journalism after reading a book that her father had bought her called "
              - link "All the President's men" [ref=f15e161] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/All_the_President's_Men
              - text: "\"."
              - superscript [ref=f15e162]:
                - link "[5]" [ref=f15e163] [cursor=pointer]:
                  - /url: "#cite_note-Barstow-5"
              - text: She subsequently went to college, studied law for two years, dropped out and then graduated with a bachelor's degree in philosophy from
              - link "Bombay University" [ref=f15e165] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bombay_University
              - text: in 1983 and started work as a journalist.
              - superscript [ref=f15e166]:
                - link "[6]" [ref=f15e167] [cursor=pointer]:
                  - /url: "#cite_note-Harvard-6"
              - text: She reported for the Mumbai editions of The Daily (India) and
              - link "The Indian Express" [ref=f15e170] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/The_Indian_Express
              - text: newspapers, and later for
              - link "Business India" [ref=f15e172] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Business_India
              - text: magazine. Her first brush with communal violence came when she covered the riots in 1984 in
              - link "Bhiwandi" [ref=f15e173] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bhiwandi
              - text: .
              - superscript [ref=f15e174]:
                - link "[7]" [ref=f15e175] [cursor=pointer]:
                  - /url: "#cite_note-7"
            - paragraph [ref=f15e177]:
              - text: Setalvad's career as a mainstream journalist was a decade long. In 1993, in response to the Hindu-Muslim riots in Mumbai, she and her husband quit their regular jobs to start
              - link "Communalism Combat" [ref=f15e179] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Communalism_Combat
              - text: ", a monthly magazine."
              - superscript [ref=f15e180]:
                - link "[5]" [ref=f15e181] [cursor=pointer]:
                  - /url: "#cite_note-Barstow-5"
              - text: According to
              - link "Javed Anand" [ref=f15e183] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Javed_Anand
              - text: (Setalvad's husband and co-founder of Communalism Combat), the decision to break from mainstream journalism to start a magazine was because it was also a platform which gave them an opportunity to intervene in ways which they couldn't have otherwise. The last print copy of the magazine was printed in November 2012.
              - superscript [ref=f15e184]:
                - link "[8]" [ref=f15e185] [cursor=pointer]:
                  - /url: "#cite_note-8"
              - text: Subsequently, they moved to the digital domain by starting a website, which has subsequently been inactive.
              - superscript [ref=f15e187]:
                - link "[9]" [ref=f15e188] [cursor=pointer]:
                  - /url: "#cite_note-9"
            - paragraph [ref=f15e190]:
              - text: Setalvad and her husband, along with others such as Father
              - link "Cedric Prakash" [ref=f15e191] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Cedric_Prakash
              - text: (a
              - link "catholic" [ref=f15e192] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Catholic
              - text: priest),
              - link "Anil Dharker" [ref=f15e193] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Anil_Dharker
              - text: (a journalist),
              - link "Alyque Padamsee" [ref=f15e194] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Alyque_Padamsee
              - text: ","
              - link "Javed Akhtar" [ref=f15e195] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Javed_Akhtar
              - text: ","
              - link "Vijay Tendulkar" [ref=f15e196] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Vijay_Tendulkar
              - text: and
              - link "Rahul Bose" [ref=f15e197] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Rahul_Bose
              - text: (all film & theatre personalities) set up an
              - link "NGO" [ref=f15e198] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/NGO
              - text: named "Citizens for Justice and Peace (CJP)" on 1 April 2002.
              - superscript [ref=f15e199]:
                - link "[10]" [ref=f15e200] [cursor=pointer]:
                  - /url: "#cite_note-10"
              - text: The NGO forthwith began to litigate in various courts against the alleged complicity of the
              - link "Chief Minister" [ref=f15e202] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Chief_Minister_of_Gujarat
              - text: and government of
              - link "Gujarat" [ref=f15e203] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gujarat
              - text: state in the riots that had broken out shortly before. Their efforts met with partial success in April 2004, when the
              - link "Supreme Court of India" [ref=f15e204] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Supreme_Court_of_India
              - text: transferred the "
              - link "Best Bakery case" [ref=f15e205] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Best_Bakery_case
              - text: "\" to the neighbouring state of"
              - link "Maharashtra" [ref=f15e206] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Maharashtra
              - text: . At the same time, the court also overturned the recent acquittal of 21 accused and ordered that the investigation and trial be conducted afresh.
              - superscript [ref=f15e207]:
                - link "[11]" [ref=f15e208] [cursor=pointer]:
                  - /url: "#cite_note-TH-20040426-11"
              - text: By 2013, all the cases filed by CPJ had been dismissed at three levels of the judiciary (trial court, state High Court and the Indian Supreme Court) and only one appeal is pending. This is an appeal to the Supreme Court against a conviction handed out by the High Court to
              - link "Maya Kodnani" [ref=f15e210] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Maya_Kodnani
              - text: ", a former minister in the government of"
              - link "Gujarat" [ref=f15e211] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gujarat
              - text: .
            - paragraph [ref=f15e212]:
              - text: "Teesta wrote the book A Footsoldier of the Constitution: A Memoir (2017) about her experiences in Gujarat. Her chapter, 'Being Their Target', from this book was reprinted in The Hunger of the Republic: Our Present in Retrospect (2021), part of the India Since the 90s series published by"
              - link "Tulika Books" [ref=f15e213] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Tulika_Books
              - text: .
            - paragraph [ref=f15e214]:
              - text: She has also authored the chapter When Guardians Betray:The Role of the Police in the book
              - link "Gujarat:The making of a tragedy" [ref=f15e215] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gujarat_The_making_of_a_tragedy
              - text: ", edited by"
              - link "Siddharth Varadarajan" [ref=f15e216] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Siddharth_Varadarajan
              - text: and published by Penguin. The book is about the
              - link "2002 Gujarat riots" [ref=f15e217] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/2002_Gujarat_riots
              - text: .
              - superscript [ref=f15e218]:
                - link "[12]" [ref=f15e219] [cursor=pointer]:
                  - /url: "#cite_note-12"
            - region [ref=f15e221]:
              - generic [ref=f15e222]:
                - heading "Allegations of witness tampering" [level=3] [ref=f15e223]
                - generic [ref=f15e224]:
                  - link "edit":
                    - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=3
              - paragraph [ref=f15e225]:
                - text: In November 2004, Setalvad was accused of pressuring
                - link "Zaheera Sheikh" [ref=f15e226] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Zaheera_Sheikh
                - text: ", the key witness in the"
                - link "Best Bakery case" [ref=f15e227] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Best_Bakery_case
                - text: ", to make certain statements, leading to the unprecedented transferral of the case outside Gujarat. In August 2005, the Supreme Court of India committee absolved her of the charges of inducement levelled against her by Zaheera and awarded a one-year jail sentence to Zaheera for perjury."
                - superscript [ref=f15e228]:
                  - link "[13]" [ref=f15e229] [cursor=pointer]:
                    - /url: "#cite_note-:0-13"
                - superscript [ref=f15e231]:
                  - link "[14]" [ref=f15e232] [cursor=pointer]:
                    - /url: "#cite_note-14"
                - text: In 2013
                - link "Tehelka" [ref=f15e234] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tehelka
                - text: in an undercover investigation discovered that Zaheera had been paid to alter her testimony. Tehelka recorded BJP member Madhu Srivastava, described by Tehelka as a "close associate of Narendra Modi" and Batthoo Srivastava describing how they had paid Rs 1.8 million to Zaheera.
                - superscript [ref=f15e235]:
                  - link "[15]" [ref=f15e236] [cursor=pointer]:
                    - /url: "#cite_note-Tehelka_Sting-15"
              - paragraph [ref=f15e238]:
                - text: Teesta Setalvad's former aide Rais Khan Pathan has filed an affidavit in the Supreme Court alleging manipulation of evidence, which were in the form of statements of witnesses, by her in five sensitive post-Godhra riot cases.
                - superscript [ref=f15e239]:
                  - link "[16]" [ref=f15e240] [cursor=pointer]:
                    - /url: "#cite_note-16"
              - paragraph [ref=f15e242]:
                - text: In April 2009, the Times of India ran a story claiming that the Special Investigation Team (SIT) set up by the
                - link "Supreme Court of India" [ref=f15e243] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Supreme_Court_of_India
                - text: to investigate and expedite the Gujarat riot cases had submitted before the Court that Teesta Setalvad had cooked up cases of violence to spice up the incidents. The SIT which is headed by former CBI director, R K Raghavan has said that false witnesses were tutored to give evidence about imaginary incidents by Teesta Setalvad and other NGOs.
                - superscript [ref=f15e244]:
                  - link "[17]" [ref=f15e245] [cursor=pointer]:
                    - /url: "#cite_note-toi-17"
                - text: The SIT charged her of "cooking up macabre tales of killings".
                - superscript [ref=f15e247]:
                  - link "[18]" [ref=f15e248] [cursor=pointer]:
                    - /url: "#cite_note-economictimes-18"
              - paragraph [ref=f15e250]:
                - text: The court was told that 22 witnesses, who had submitted identical affidavits before various courts relating to riot incidents, were questioned by SIT and it was found that the witnesses had not actually witnessed the incidents and they were tutored and the affidavits were handed over to them by Setalvad.
                - superscript [ref=f15e251]:
                  - link "[18]" [ref=f15e252] [cursor=pointer]:
                    - /url: "#cite_note-economictimes-18"
                - text: The report which was brought to the notice of the bench consisting of Justices Arijit Pasayat, P Sathasivam and Aftab Alam, noted that the much publicised case of a pregnant Muslim woman Kausar Bano being gangraped by a mob and foetus being removed with sharp weapons, was also fabricated, and false.
                - superscript [ref=f15e254]:
                  - link "[17]" [ref=f15e255] [cursor=pointer]:
                    - /url: "#cite_note-toi-17"
                - superscript [ref=f15e257]:
                  - link "[19]" [ref=f15e258] [cursor=pointer]:
                    - /url: "#cite_note-19"
                - text: However, Kausar Bano's husband states alleges the doctors falsified the post-mortem despite his wife's uterus having been removed from her body.
                - superscript [ref=f15e260]:
                  - link "[20]" [ref=f15e261] [cursor=pointer]:
                    - /url: "#cite_note-indexpress-kausar-20"
                - text: The court that was trying the issue found beyond reasonable doubt that Babu Bajarangi killed Kausar Bano and her nine-month-old foetus by stabbing her in the stomach with a sword, but did not find sufficient evidence to prove that he removed the foetus from the uterus.
                - superscript [ref=f15e263]:
                  - link "[21]" [ref=f15e264] [cursor=pointer]:
                    - /url: "#cite_note-thehindu-bajarangi-foetus-21"
              - paragraph [ref=f15e266]:
                - text: A day later, the Times of India published a letter from Citizens for Justice and Peace claiming that the report in question was not SIT report but a report by the Gujarat Government.
                - superscript [ref=f15e267]:
                  - link "[22]" [ref=f15e268] [cursor=pointer]:
                    - /url: "#cite_note-22"
                - text: The author of the Times article responded saying "My report was based on the SIT report and not any document circulated by the Gujarat government, as suggested by CJP. Whether any section of the media has the report or not is irrelevant as TOI has access to the report.
                - superscript [ref=f15e270]:
                  - link "[23]" [ref=f15e271] [cursor=pointer]:
                    - /url: "#cite_note-23"
              - paragraph [ref=f15e273]:
                - text: R.K. Raghavan, the chairman of the SIT criticised the report leakage, saying, "The alleged reported leaks appear to be inspired by dubious motives. I cannot confirm such claims. The act is highly condemnable". However, he refused to deny or confirm whether the leaked contents were true.
                - superscript [ref=f15e274]:
                  - link "[24]" [ref=f15e275] [cursor=pointer]:
                    - /url: "#cite_note-HTraghavan-24"
                - text: The Supreme Court itself condemned the leaking of the SIT report as a 'betrayal of trust' but did not deny the report itself.
                - superscript [ref=f15e277]:
                  - link "[25]" [ref=f15e278] [cursor=pointer]:
                    - /url: "#cite_note-SCSIT-25"
                - text: Raghvan noted that "many incidents were cooked up, false witnesses were tutored to give evidence about imaginary incidents, and false charges levelled against the then Ahmedabad police chief P C Pandey".
                - superscript [ref=f15e280]:
                  - link "[26]" [ref=f15e281] [cursor=pointer]:
                    - /url: "#cite_note-news.oneindia.in-26"
            - region [ref=f15e283]:
              - generic [ref=f15e284]:
                - heading "Allegations of misappropriation of funds" [level=3] [ref=f15e285]
                - generic [ref=f15e286]:
                  - link "edit":
                    - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=4
              - paragraph [ref=f15e287]:
                - text: In 2013, twelve residents of the Gulbarg Society who were the victim of Gujarat riots, accused Setalvad of collecting donations in the name of riot victims but failing to use them for their benefit and sent a legal notice to her. They claimed that she had collected huge donations from national and international organisations in the name of providing financial assistance for reconstruction of houses or developing the society into a museum but it was not passed to the members of the society. They also sought to ban her organisation "Citizens for Justice and Peace" and prevent them entering the society to organise programmes.
                - superscript [ref=f15e288]:
                  - link "[27]" [ref=f15e289] [cursor=pointer]:
                    - /url: "#cite_note-zee1-27"
                - superscript [ref=f15e291]:
                  - link "[28]" [ref=f15e292] [cursor=pointer]:
                    - /url: "#cite_note-28"
                - text: The Ahmedabad Crime Branch is conducting an inquiry into the matter.
                - superscript [ref=f15e294]:
                  - link "[29]" [ref=f15e295] [cursor=pointer]:
                    - /url: "#cite_note-29"
              - paragraph [ref=f15e297]:
                - text: On 13 March 2013, the official representatives including the secretary and chairman of the Gulbarg Cooperative Housing Society in a letter
                - superscript [ref=f15e298]:
                  - link "[30]" [ref=f15e299] [cursor=pointer]:
                    - /url: "#cite_note-soc-30"
                - text: to the joint commissioner of Police, Crime Branch, Ahmedabad, informed him that the letter-head of the society had been misused by some residents and the claims being made by them were patently false since nothing had been parted from them.
                - superscript [ref=f15e301]:
                  - link "[30]" [ref=f15e302] [cursor=pointer]:
                    - /url: "#cite_note-soc-30"
                - text: A similar letter was also released to the media.
                - superscript [ref=f15e304]:
                  - link "[31]" [ref=f15e305] [cursor=pointer]:
                    - /url: "#cite_note-lett-31"
                - text: In a press release CJP and Sabrang clarified
                - superscript [ref=f15e307]:
                  - link "[32]" [ref=f15e308] [cursor=pointer]:
                    - /url: "#cite_note-pr-32"
                - text: that CJP never sought nor received any money for the museum. Sabrang Trust had raised an amount of Rs 460,285 nationally and internationally from donors for the purpose of the museum and since the plan has been abandoned because of the spiralling real estate prices, the matter is between the trust and the donors which they will address when final decision is taken. All other funds, nationally and internationally raised, have been funds legitimately collected for activities that they publicly engage in. Their accounts are audited and submitted to the relevant authorities.
                - superscript [ref=f15e310]:
                  - link "[32]" [ref=f15e311] [cursor=pointer]:
                    - /url: "#cite_note-pr-32"
                - text: Subsequent to the letter written by the Gulbarg Society members to the police, the police sent them a letter asking for the status quo to be maintained while investigations were in progress.
                - superscript [ref=f15e313]:
                  - link "[33]" [ref=f15e314] [cursor=pointer]:
                    - /url: "#cite_note-33"
                - text: Later, the Crime Branch claimed that the complaint did not have any substance and instead filed an FIR against Setalvad.
                - superscript [ref=f15e316]:
                  - link "[34]" [ref=f15e317] [cursor=pointer]:
                    - /url: "#cite_note-soc1-34"
              - paragraph [ref=f15e319]:
                - text: After a
                - link "First Information Report" [ref=f15e320] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/First_Information_Report
                - text: was filed by the Ahmedabad police on 4 January 2014 Teesta Setalvad and Javed Anand were granted interim bail. According to the judge, similar relief has been provided in the past when false allegations were raised. The bail application stated that "The FIR is a mala fide action of the Crime Branch, Ahmedabad, to intimidate a human rights defender. This is the fifth time that a false criminal case has been lodged since 2004 because of me and my organization's consistent legal support to the victims of 2002 riots ... Gulbarga cooperative housing society had been totally burnt down by politically motivated anti-social elements and 68 people had lost their lives in the massacre." It also said the accusation was brought by "powerful forces in Gujarat who wish(ed) to stymie the appeal in the Zakia Jafri case".
                - superscript [ref=f15e321]:
                  - link "[35]" [ref=f15e322] [cursor=pointer]:
                    - /url: "#cite_note-35"
              - paragraph [ref=f15e324]:
                - text: On finding that the Crime Branch, Ahmedabad instead of acting on his complaint had filed an FIR against Setalvad and others, the Secretary of the Gulbarg Housing Society, Firoz Gulzar Pathan moved the court complaining against Gujarat police's biased approach. The court sought a report from the Crime Branch. The Police responded by claiming that the complaint did not have any substance. This was countered by the complainant's advocate who maintained that the Crime Branch had not even bothered to question the complainant before shelving the complaint. This led the magisterial court on 15 February 2014 to direct the city crime branch to lodge an FIR and start investigation against former residents of Gulbarg Society who had made the complaint against Setalvad last year.
                - superscript [ref=f15e325]:
                  - link "[34]" [ref=f15e326] [cursor=pointer]:
                    - /url: "#cite_note-soc1-34"
                - text: On 28 November 2014, local court rejected pleas filed by activist Teesta Setalvad, her husband Javed Anand and their two NGOs seeking to de-freeze their bank accounts attached earlier by police in connection with the embezzlement case.
                - superscript [ref=f15e328]:
                  - link "[36]" [ref=f15e329] [cursor=pointer]:
                    - /url: "#cite_note-36"
                - text: On 12 February 2015,
                - link "Gujarat High Court" [ref=f15e331] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gujarat_High_Court
                - text: rejected Setalvad's
                - link "anticipatory bail" [ref=f15e332] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Anticipatory_bail
                - text: plea regarding the case.
                - superscript [ref=f15e333]:
                  - link "[37]" [ref=f15e334] [cursor=pointer]:
                    - /url: "#cite_note-etx-37"
                - superscript [ref=f15e336]:
                  - link "[38]" [ref=f15e337] [cursor=pointer]:
                    - /url: "#cite_note-38"
                - text: However she was given an interim protection by the Supreme Court of India and on 19 March 2015, a two-judge bench of the Court referred the issue involved in her case to a large three-judge bench.
                - superscript [ref=f15e339]:
                  - link "[39]" [ref=f15e340] [cursor=pointer]:
                    - /url: "#cite_note-39"
                - superscript [ref=f15e342]:
                  - link "[40]" [ref=f15e343] [cursor=pointer]:
                    - /url: "#cite_note-40"
          - region [ref=f15e345]:
            - generic [ref=f15e346]:
              - heading "Activism" [level=2] [ref=f15e347]
              - generic [ref=f15e348]:
                - link "edit":
                  - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=5
            - figure "Teesta Setalvad addressing a gathering at VJT Hall Trivandrum, Kerala." [ref=f15e349]:
              - link [ref=f15e350] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/File:Teesta_Setalvad_in_Kerala_two.JPG
            - list [ref=f15e353]:
              - listitem [ref=f15e354]:
                - text: Teesta, with her husband
                - link "Javed Anand" [ref=f15e355] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Javed_Anand
                - text: is the co-founder and co-editor of the magazine Communalism Combat which fosters communal harmony by attacking entities propounding communal violence.
              - listitem [ref=f15e356]:
                - text: Teesta testified at the
                - link "United States Commission on International Religious Freedom" [ref=f15e357] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/United_States_Commission_on_International_Religious_Freedom
                - text: on 10 June 2002 against the BJP-led Gujarat government's role in the
                - link "2002 Gujarat violence" [ref=f15e358] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2002_Gujarat_violence
                - text: .
                - superscript [ref=f15e359]:
                  - link "[41]" [ref=f15e360] [cursor=pointer]:
                    - /url: "#cite_note-41"
              - listitem [ref=f15e362]:
                - text: In 1997, Teesta started work on a project, Khoj (Quest), which aims to rewrite sections of Indian school History and Social Studies textbooks to remove "anti-minority prejudices".
                - superscript [ref=f15e363]:
                  - link "[42]" [ref=f15e364] [cursor=pointer]:
                    - /url: "#cite_note-42"
              - listitem [ref=f15e366]:
                - text: Teesta is a staunch
                - link "feminist" [ref=f15e367] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Feminism_in_India
                - text: and campaigns for rights and privileges of
                - link "Dalits" [ref=f15e368] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dalits
                - text: ","
                - link "Muslims" [ref=f15e369] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_Muslims
                - text: and women.
                - superscript [ref=f15e370]:
                  - link "[6]" [ref=f15e371] [cursor=pointer]:
                    - /url: "#cite_note-Harvard-6"
              - listitem [ref=f15e373]:
                - text: Teesta's husband Javed Anand runs
                - link "Sabrang Communications" [ref=f15e375] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sabrang_Communications
                - text: which fights for human rights. Teesta is the official spokesperson of this organisation.
              - listitem [ref=f15e376]: Teesta heads the Mumbai-based NGO Citizens for Justice and Peace (CJP).
              - listitem [ref=f15e377]:
                - text: She is one of the founders of the Women in the Media Committee.
                - superscript [ref=f15e378]:
                  - link "[43]" [ref=f15e379] [cursor=pointer]:
                    - /url: "#cite_note-nuernberg.de-43"
                - text: The group seeks to bring together working women journalists to raise job-related concerns and awareness of gender-sensitivity in writing and reporting on issues concerning women.
              - listitem [ref=f15e381]:
                - text: She is one of the founding members of Journalists Against Communalism.
                - superscript [ref=f15e382]:
                  - link "[43]" [ref=f15e383] [cursor=pointer]:
                    - /url: "#cite_note-nuernberg.de-43"
              - listitem [ref=f15e385]:
                - text: "Apart from the journalistic tasks Teesta Setalvad leads the project \"Khoj: Education for A pluralistic India\"."
                - superscript [ref=f15e386]:
                  - link "[44]" [ref=f15e387] [cursor=pointer]:
                    - /url: "#cite_note-menschenrechte-44"
              - listitem [ref=f15e389]:
                - text: Teesta is General Secretary of
                - link "People's Union for Human Rights" [ref=f15e390] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/People's_Union_for_Human_Rights?action=edit&redlink=1
                - text: (PUHR).
                - superscript [ref=f15e391]:
                  - link "[44]" [ref=f15e392] [cursor=pointer]:
                    - /url: "#cite_note-menschenrechte-44"
              - listitem [ref=f15e394]:
                - text: Member of the
                - 'link "Pakistan India: People''s Forum for Peace and Democracy" [ref=f15e395] [cursor=pointer]':
                  - /url: https://en.wikipedia.org/wiki/Pakistan_India:_People's_Forum_for_Peace_and_Democracy?action=edit&redlink=1
                - text: .
                - superscript [ref=f15e396]:
                  - link "[44]" [ref=f15e397] [cursor=pointer]:
                    - /url: "#cite_note-menschenrechte-44"
          - region [ref=f15e399]:
            - generic [ref=f15e400]:
              - heading "Zakia Jafri-CJP petition" [level=2] [ref=f15e401]
              - generic [ref=f15e402]:
                - link "edit":
                  - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=6
            - paragraph [ref=f15e403]:
              - link "Zakia Jafri" [ref=f15e404] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Zakia_Jafri
              - text: "-CJP Special leave petition"
              - superscript [ref=f15e405]:
                - link "[45]" [ref=f15e406] [cursor=pointer]:
                  - /url: "#cite_note-45"
              - text: seeks a criminal trial of Narendra Modi, the then Chief Minister of Gujarat and the current Prime minister of India and 62 other politicians and government officials for alleged complicity in the Gujarat violence of 2002.
              - superscript [ref=f15e408]:
                - link "[46]" [ref=f15e409] [cursor=pointer]:
                  - /url: "#cite_note-telegraphindia.com-46"
              - text: The criminal conspiracy complaint alleges that in a meeting of senior police officers and officials convened by the then Chief minister Mr Modi on 27 February 2002 following
              - link "the Godhra tragedy" [ref=f15e411] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Godhra_train_burning
              - text: ", he issued his \"let Hindus give vent to their anger\" directive. In all, there are 30 interrelated and closely interlocked allegations including:"
              - superscript [ref=f15e412]:
                - link "[47]" [ref=f15e413] [cursor=pointer]:
                  - /url: "#cite_note-47"
            - list [ref=f15e415]:
              - listitem [ref=f15e416]: parading dead bodies of Godhra victims to inflame passions
              - listitem [ref=f15e417]: police control rooms being staffed by Cabinet ministers
              - listitem [ref=f15e418]: police investigations being botched
              - listitem [ref=f15e419]:
                - link "VHP" [ref=f15e420] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vishva_Hindu_Parishad
                - text: personnel being appointed as public prosecutors
              - listitem [ref=f15e421]:
                - text: promotion of police officers like Mr M.K. Tandon and Mr P.B. Gondia, who faced serious charges of dereliction of duty as a result of which over 200 Muslims were killed in
                - link "Gulbarg society" [ref=f15e422] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gulbarg_Society_massacre
                - text: ","
                - link "Naroda Patiya" [ref=f15e423] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Naroda_Patiya_massacre
                - text: and Naroda Gaam in Ahmedabad
              - listitem [ref=f15e424]: penalising upright police officers
              - listitem [ref=f15e425]: ignoring intelligence warnings
              - listitem [ref=f15e426]: destruction of carnage-related records
            - paragraph [ref=f15e427]:
              - text: In response to the petition, the Supreme Court on 27 April 2009 ordered the Special Investigation Team (SIT) they appointed to undertake the investigation.
              - superscript [ref=f15e428]:
                - link "[48]" [ref=f15e429] [cursor=pointer]:
                  - /url: "#cite_note-48"
              - text: The SIT under the Chairmanship of
              - link "R. K. Raghavan" [ref=f15e431] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/R._K._Raghavan
              - text: was originally formed to investigate nine major cases of riots in Gujarat in 2002.
            - paragraph [ref=f15e432]:
              - text: The SIT submitted a preliminary report in May 2010.
              - superscript [ref=f15e433]:
                - link "[49]" [ref=f15e434] [cursor=pointer]:
                  - /url: "#cite_note-49"
              - text: Chairman R. K. Raghavan submitted his comments to the report for perusal of the Supreme Court on 14 May 2010
              - superscript [ref=f15e436]:
                - link "[50]" [ref=f15e437] [cursor=pointer]:
                  - /url: "#cite_note-50"
              - text: Further investigation report was filed in November 2010. The Supreme Court in November 2010 appointed Raju Ramachandran as
              - link "amicus curiae" [ref=f15e440] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Amicus_curiae
              - text: to assist the court in this case. The amicus curiae submitted a note dated 20 January 2011 to the Supreme Court.
              - superscript [ref=f15e441]:
                - link "[51]" [ref=f15e442] [cursor=pointer]:
                  - /url: "#cite_note-51"
            - paragraph [ref=f15e444]:
              - text: On 15 March 2011, the Supreme Court directed SIT to examine the observations of the amicus curiae, to re-examine the entire evidence recorded and if some more evidence is required to be recorded, to do so. It observed that the SIT chairman's inferences did not match with the findings of the SIT probe.
              - superscript [ref=f15e445]:
                - link "[52]" [ref=f15e446] [cursor=pointer]:
                  - /url: "#cite_note-52"
              - text: Thereafter the SIT examined more witnesses and recorded their statements and submitted a further investigation report on 24 April 2011. On 5 May 2011, during a hearing in the Supreme Court, Shanti Bhushan, the counsel for Zakia Jafri, alleged that SIT was a doing cover-up job and sought copies of the investigation reports. The amicus curiae Raju Ramachandran informed the court that he had received a copy of an affidavit filed by
              - link "Sanjiv Bhatt" [ref=f15e448] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Sanjiv_Bhatt
              - text: that he was present at a 27 February 2002 meeting convened by the chief minister where instructions were given to teach Muslims a lesson.
              - superscript [ref=f15e449]:
                - link "[53]" [ref=f15e450] [cursor=pointer]:
                  - /url: "#cite_note-SB-53"
              - text: The Supreme Court ordered "The copies of the report, along with the comments of the chairman, be given to the amicus curiae, who shall analyse them in the light of evidence, statements of witnesses, and have his independent assessment of the entire evidence which has come on record". The court further said,"If the amicus curiae, on the basis of evidence on record, finds that any offence is made out against any person, he shall mention the same in the report".
              - superscript [ref=f15e452]:
                - link "[53]" [ref=f15e453] [cursor=pointer]:
                  - /url: "#cite_note-SB-53"
              - text: The amicus curiae Raju Ramachandran submitted his final report
              - superscript [ref=f15e455]:
                - link "[54]" [ref=f15e456] [cursor=pointer]:
                  - /url: "#cite_note-54"
              - text: where he found sufficient evidence to make Mr Modi stand trial.
              - superscript [ref=f15e458]:
                - link "[55]" [ref=f15e459] [cursor=pointer]:
                  - /url: "#cite_note-55"
            - paragraph [ref=f15e461]:
              - text: Thereafter, the Court directed the SIT to submit the final report along with the entire material collected by them to the trial court. The SIT was also given access to the reports of the amicus curiae submitted earlier to the court.
              - superscript [ref=f15e462]:
                - link "[56]" [ref=f15e463] [cursor=pointer]:
                  - /url: "#cite_note-56"
              - text: The SIT did not agree with his conclusion
              - superscript [ref=f15e465]:
                - link "[57]" [ref=f15e466] [cursor=pointer]:
                  - /url: "#cite_note-57"
              - text: and filed the closure report on 8 February 2012.
              - superscript [ref=f15e468]:
                - link "[58]" [ref=f15e469] [cursor=pointer]:
                  - /url: "#cite_note-58"
              - text: The trial court on 10 April 2012 observed that SIT had not found any evidence for the prosecution of Modi or any of the top bureaucrats or police officials and had recommended that the investigation be closed.
            - paragraph [ref=f15e471]:
              - text: The court gave the complainant, Zakia Jafri, the option of filing a protest petition
              - superscript [ref=f15e472]:
                - link "[59]" [ref=f15e473] [cursor=pointer]:
                  - /url: "#cite_note-59"
              - text: However SIT raised various objections to giving all the investigation papers to the petitioner and finally on 7 February 2013, the Supreme Court asked the SIT to hand over copies of all the reports and investigation papers to the petitioners.
              - superscript [ref=f15e475]:
                - link "[60]" [ref=f15e476] [cursor=pointer]:
                  - /url: "#cite_note-60"
              - text: The protest petition
              - superscript [ref=f15e478]:
                - link "[61]" [ref=f15e479] [cursor=pointer]:
                  - /url: "#cite_note-61"
              - superscript [ref=f15e481]:
                - link "[62]" [ref=f15e482] [cursor=pointer]:
                  - /url: "#cite_note-62"
              - text: was filed on 15 April 2013.
              - superscript [ref=f15e484]:
                - link "[63]" [ref=f15e485] [cursor=pointer]:
                  - /url: "#cite_note-63"
            - paragraph [ref=f15e487]:
              - text: In April 2013, the SIT while opposing the protest petition filed by Zakia Jafri and CJP against SIT's closure report submitted before a local court that "Teesta Setalvad and others have falsified the complaint targeting the chief minister who had never said that go and kill people." Their lawyer further submitted that the so-called incident of Chief Minister (Narendra Modi) giving instructions (in the meeting) to high-level police officers not to take action against the rioters is a sole creation of Teesta Setalvad. There is no evidence to the same and that Setalvad was not present during the incident.
              - superscript [ref=f15e488]:
                - link "[64]" [ref=f15e489] [cursor=pointer]:
                  - /url: "#cite_note-dna-falseclaims-64"
              - superscript [ref=f15e491]:
                - link "[65]" [ref=f15e492] [cursor=pointer]:
                  - /url: "#cite_note-65"
              - superscript [ref=f15e494]:
                - link "[66]" [ref=f15e495] [cursor=pointer]:
                  - /url: "#cite_note-66"
              - superscript [ref=f15e497]:
                - link "[67]" [ref=f15e498] [cursor=pointer]:
                  - /url: "#cite_note-67"
            - paragraph [ref=f15e500]:
              - text: In their argument that sufficient grounds existed for ordering criminal prosecution of Modi, Zakia Jafri's counsel told the court that SIT which gave Modi a clean chit, itself behaved like a conspirator and glossed over a wealth of official evidence which suggested State complicity in the incidents.
              - superscript [ref=f15e501]:
                - link "[68]" [ref=f15e502] [cursor=pointer]:
                  - /url: "#cite_note-one-68"
            - paragraph [ref=f15e504]:
              - text: In June 2022, the Supreme Court on rejected plea by Zakia Jafri, and accused Setalvad of exploiting emotions of Jafri.
              - superscript [ref=f15e505]:
                - link "[69]" [ref=f15e506] [cursor=pointer]:
                  - /url: "#cite_note-69"
          - region [ref=f15e508]:
            - generic [ref=f15e509]:
              - heading "Arrest and reactions" [level=2] [ref=f15e510]
              - generic [ref=f15e511]:
                - link "edit":
                  - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=7
            - paragraph [ref=f15e512]:
              - text: In June 2022, she was arrested by the Anti Terrorism Squad of Gujarat Police for allegedly conspiring to implicate the Gujarat government functionaries in the 2002 Gujarat Riots.
              - superscript [ref=f15e513]:
                - link "[70]" [ref=f15e514] [cursor=pointer]:
                  - /url: "#cite_note-70"
              - superscript [ref=f15e516]:
                - link "[71]" [ref=f15e517] [cursor=pointer]:
                  - /url: "#cite_note-71"
              - link "Amnesty International India" [ref=f15e519] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Amnesty_International_India
              - text: has said that Setalvad's arrest is a 'direct reprisal' against human rights activists.
              - superscript [ref=f15e520]:
                - link "[72]" [ref=f15e521] [cursor=pointer]:
                  - /url: "#cite_note-72"
              - text: Protests by citizens were held in
              - link "Kolkata" [ref=f15e523] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Kolkata
              - text: and
              - link "Bangalore" [ref=f15e524] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bangalore
              - text: against her arrest.
              - superscript [ref=f15e525]:
                - link "[73]" [ref=f15e526] [cursor=pointer]:
                  - /url: "#cite_note-73"
              - text: On 1 September 2022, the
              - link "Supreme Court" [ref=f15e528] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Supreme_Court_of_India
              - text: "said that some details of the case were sketchy. These were: no chargesheet was filed while she was in custody since last 2 months, the registration of FIR was filed the day just after the Supreme Court dismissed Zakia Jafri's case, the Gujarat High court granted a long adjournment, and there are no offences which stop the Gujarat High Court for granting the bail."
              - superscript [ref=f15e529]:
                - link "[74]" [ref=f15e530] [cursor=pointer]:
                  - /url: "#cite_note-74"
              - text: The next day, Supreme Court granted her interim bail on the ground that she was a woman, leaving the decision of regular bail to the
              - link "Gujarat High Court" [ref=f15e532] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gujarat_High_Court
              - text: after which she was released from jail.
              - superscript [ref=f15e533]:
                - link "[75]" [ref=f15e534] [cursor=pointer]:
                  - /url: "#cite_note-75"
              - superscript [ref=f15e536]:
                - link "[76]" [ref=f15e537] [cursor=pointer]:
                  - /url: "#cite_note-76"
              - text: The Gujarat High Court later denied her regular bail and directed her to surrender immediately, which was criticized by the Supreme Court as "totally perverse" and "contradictory" while granting her regular bail on 19 July 2023.
              - superscript [ref=f15e539]:
                - link "[77]" [ref=f15e540] [cursor=pointer]:
                  - /url: "#cite_note-:1-77"
            - region [ref=f15e542]:
              - generic [ref=f15e543]:
                - heading "Allegations of political motivation" [level=3] [ref=f15e544]
                - generic [ref=f15e545]:
                  - link "edit":
                    - /url: /w/index.php?title=Teesta_Setalvad&action=edit&section=8
              - paragraph [ref=f15e546]:
                - text: Though cases against Teesta are still in courts, some journalists have suggested that the case against Teesta is politically motivated, linked to her criticism of
                - link "Narendra Modi" [ref=f15e547] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Narendra_Modi
                - text: . Some have also disputed the validity of the corruption allegations against her.
                - superscript [ref=f15e548]:
                  - link "[78]" [ref=f15e549] [cursor=pointer]:
                    - /url: "#cite_note-78"
                - superscript [ref=f15e551]:
                  - link "[79]" [ref=f15e552] [cursor=pointer]:
                    - /url: "#cite_note-79"
                - superscript [ref=f15e554]:
                  - link "[80]" [ref=f15e555] [cursor=pointer]:
                    - /url: "#cite_note-80"
                - text: In a signed article in
                - link "Outlook" [ref=f15e557] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Outlook_(Indian_magazine)
                - text: magazine, published in March 2015,
                - link "Indira Jaising" [ref=f15e558] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indira_Jaising
                - text: "wrote that Teesta's organization Citizens for Justice and Peace (CJP) did creditable work in obtaining convictions for 119 people (including a Minister) for participating in the Gujarat riots. Jaising went on to say that:"
              - blockquote [ref=f15e559]:
                - paragraph [ref=f15e560]:
                  - text: The case against Teesta smacks of a plan to deter her from assisting victims of the Gujarat 2002 riots. The financial dealings of Teesta and CJP can be probed, but the disproportionality of the legal process, the timing, and the insistence of the prosecution on custodial interrogation, smack of vendetta.
                  - superscript [ref=f15e561]:
                    - link "[81]" [ref=f15e562] [cursor=pointer]:
                      - /url: "#cite_note-81"
              - paragraph [ref=f15e564]:
                - text: The Gujarat government has rejected the characterization of the case as politically motivated.
                - link "Solicitor General" [ref=f15e565] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Solicitor_General_of_India
                - link "Tushar Mehta" [ref=f15e566] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tushar_Mehta
                - text: told the
                - link "Supreme Court" [ref=f15e567] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Supreme_Court_of_India
                - text: that Setalvad should be treated as an ordinary accused whose bail had been rejected, rather than given special consideration.
                - superscript [ref=f15e568]:
                  - link "[82]" [ref=f15e569] [cursor=pointer]:
                    - /url: "#cite_note-82"
                - text: He drew this position from the
                - link "Gujarat High Court" [ref=f15e571] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gujarat_High_Court
                - text: "'s own findings that she had prima facie exploited communal sentiments for the electoral benefit of a political party that funded her."
                - superscript [ref=f15e572]:
                  - link "[83]" [ref=f15e573] [cursor=pointer]:
                    - /url: "#cite_note-83"
                - text: The Supreme Court subsequently granted her bail.
                - superscript [ref=f15e575]:
                  - link "[77]" [ref=f15e576] [cursor=pointer]:
                    - /url: "#cite_note-:1-77"
                - text: The case remains before the courts with bail conditions, including surrender of her passport, still in effect.
                - superscript [ref=f15e578]:
                  - link "[84]" [ref=f15e579] [cursor=pointer]:
                    - /url: "#cite_note-84"
