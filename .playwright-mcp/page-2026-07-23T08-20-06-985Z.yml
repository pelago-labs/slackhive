          - generic [ref=f13e211]:
            - generic [ref=f13e215]:
              - generic [ref=f13e218]:
                - heading "Dipak Deb" [level=4] [ref=f13e219]
                - generic:
                  - list
              - generic [ref=f13e221]:
                - text: 
                - paragraph [ref=f13e222]: My name is Dipak Deb and despite belonging to Tripura, an Indian state, I was declared foreigner by a Foreigners’ Tribunal in Assam, and sent to the Goalpara Detention Centre in November 2016.
                - paragraph [ref=f13e223]: I fell ill shortly afterwards, and needed urgent medical attention. But shockingly, I was made to wear handcuffs during the hospital visit! It was humiliating to be treated like a common criminal!
                - paragraph [ref=f13e224]: But I truly began to fear for my life after another inmate, Subhrata De, died suddenly one day. I had spoken to him the day before and he did not appear ill.
                - paragraph [ref=f13e225]: My ailing mother feared she would die without seeing me again. CJP has given us a new lease of life by helping me get released.
                - text: 
            - generic [ref=f13e229]:
              - generic [ref=f13e232]:
                - heading "Shanti Basfore" [level=4] [ref=f13e233]
                - generic:
                  - list
              - generic [ref=f13e235]:
                - text: 
                - paragraph [ref=f13e236]: My name is Shanti Basfore and I’m a Hindi-speaking Dalit woman from Dhubri.
                - paragraph [ref=f13e237]: I was married off when I was just a teenager and moved to my husband’s home in the neighbouring village. Little did I know that it would lead to me being marked as a “doubtful” or D-Voter.
                - paragraph [ref=f13e238]: The FT served me a notice in 2017, but I didn’t appear as I don’t understand these things. Also, I don’t have the money to travel.
                - paragraph [ref=f13e239]: So, I was declared foreigner in an ex parte judgment and sent to the Korajhar Detention Camp.
                - paragraph [ref=f13e240]: With CJPs help, I was able to get released in June 2021.
                - paragraph [ref=f13e241]: There are many others who have suffered the way I have suffered. I am grateful to CJP and I hope you will also help many others. You have my blessings.
                - text: 
            - generic [ref=f13e245]:
              - generic [ref=f13e248]:
                - heading "Sokalo Gond" [level=4] [ref=f13e249]
                - generic:
                  - list
              - generic [ref=f13e251]:
                - text: 
                - paragraph [ref=f13e252]: My name is Sokalo Gond and I’m an Adivasi and Forest Rights defender from Sonbhadra, Uttar Pradesh. In May 2018, my fellow activist Kismatiya Gond and I were detained illegally for voicing the grievances about police brutality against Adivasi women. I am grateful to CJP for filing a habeas corpus petition and freeing us from prison. CJP also helped another activist Nivada Rana and me move the Supreme Court to prevent the ouster of Adivasis from forest land.
                - text: 
