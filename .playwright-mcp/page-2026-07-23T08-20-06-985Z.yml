            - text: For over 15 years, CJP has stood for the defence of rights and dignity of the voiceless and most marginalized sections of Indian society. Bringing alive the values of individual and collective freedoms and dignities enshrined in the Indian Constitution and its Preamble, CJP has stood for equality, dignity and non-discrimination of all Indians. We have intervened in the courts to ensure accountability of persons in power and in high office. Justice, we believe, is a prerequisite for lasting peace and social harmony
