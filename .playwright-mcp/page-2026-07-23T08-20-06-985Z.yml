            - link "WHY CJP?" [ref=f13e142] [cursor=pointer]:
              - /url: /about
            - paragraph [ref=f13e146]: Citizens for Justice and Peace (CJP) is a Human Rights movement dedicated to upholding and defending the freedom and constitutional rights of all Indians. We call our focus areas our Four Pillars
            - generic [ref=f13e148]:
              - generic [ref=f13e150]:
                - generic [ref=f13e153]: Minority Rights
                - paragraph [ref=f13e158]: Rights of religious, ethnic, caste, gender and sexual minorities as well as persons with disabilities.
              - generic [ref=f13e160]:
                - generic [ref=f13e163]: Freedom of Expression
                - paragraph [ref=f13e168]: A healthy and vibrant democracy always respects free expression and the dignity of different belief systems, cultures and languages.
              - generic [ref=f13e170]:
                - generic [ref=f13e173]: Criminal Justice Reform
                - paragraph [ref=f13e178]: CJP believes that our agencies - investigation, prosecutorial and judicial - need further democratisation to ensure both, quality and quick justice delivery.
              - generic [ref=f13e180]:
                - generic [ref=f13e183]: Child Rights
                - paragraph [ref=f13e188]: CJP works to inculcate pluralism and Constitutional values in young minds. We also work in the field of Juvenile Justice Reform and protection of children from Sexual Abuse.
